local function createIntroVehiclePart(size, color, offset, shape)
    local p = create("Part", motoModel, {Size = size, Color = color, Material = Enum.Material.SmoothPlastic, Shape = shape or Enum.PartType.Block, CanCollide = false, Anchored = false})
    p.CFrame = rootPart.CFrame * offset
    local weld = Instance.new("WeldConstraint", p)
    weld.Part0 = rootPart
    weld.Part1 = p
    return p
end

