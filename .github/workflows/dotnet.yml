end)

-- NÚT DỌN DẸP CHUNG (XÓA CẢ THANG VÀ CẦU)
makeTabBtn(TabUtilsPage, "🧹 XÓA CẦU & THANG ĐÃ XÂY", Color3.fromRGB(150, 50, 50), function() BuildFolder:ClearAllChildren() end)

-- --- TÍNH NĂNG MỚI: TỰ ĐỘNG TP THEO SỐ GIÂY (LOOP TELEPORT) ---
local LoopTPOn = false
local LoopTimeValue = 5 -- Mặc định 5 giây tự động về vị trí cũ một lần

local LoopTimeBox = create("TextBox", TabUtilsPage, {Size = UDim2.new(1, -6, 0, 30), PlaceholderText = "Thời gian lặp TP (giây)...", Text = "Thời gian lặp: 5 giây", BackgroundColor3 = Color3.fromRGB(45, 45, 45), TextColor3 = Color3.new(1, 1, 1), Font = Enum.Font.SourceSans, TextSize = 14})
create("UICorner", LoopTimeBox, {CornerRadius = UDim.new(0, 5)})
LoopTimeBox.FocusLost:Connect(function()
    local n = tonumber(LoopTimeBox.Text:match("%d+")) or tonumber(LoopTimeBox.Text)
    LoopTimeValue = n and math.clamp(n, 1, 300) or 5
    LoopTimeBox.Text = "Thời gian lặp: " .. tostring(LoopTimeValue) .. " giây"
end)

local LoopTPBtn = makeTabBtn(TabUtilsPage, "Loop TP: OFF", Color3.fromRGB(200, 50, 50), function(b)
    if not SavedCFrame then 
        b.Text = "❌ Chưa lưu vị trí!" task.wait(1.5)
        b.Text = LoopTPOn and "Loop TP: ON" or "Loop TP: OFF" return 
    end
    LoopTPOn = not LoopTPOn
    b.Text = LoopTPOn and "Loop TP: ON" or "Loop TP: OFF"
    b.BackgroundColor3 = LoopTPOn and Color3.fromRGB(50, 200, 50) or Color3.fromRGB(200, 50, 50)
end)

-- Tạo luồng chạy lặp TP ngầm độc lập
task.spawn(function()
    while task.wait(0.5) do
        if LoopTPOn and SavedCFrame then
            task.wait(LoopTimeValue - 0.5) -- Đợi theo cấu hình giây của bạn
            if LoopTPOn and SavedCFrame and Character and Character:FindFirstChild("HumanoidRootPart") then
                Character.HumanoidRootPart.CFrame = SavedCFrame
            end
        end
    end
end)

-- --- KHU VỰC UTILS CŨ KHÁC ---
local FireOn = false
local function applyFire(st) 
    for _, p in pairs(Character:GetChildren()) do 
        if p:IsA("BasePart") then local ex = p:FindFirstChild("HubFire") if st and not ex then create("Fire", p, {Name = "HubFire", Size = 6}) elseif not st and ex then ex:Destroy() end end 
    end 
end
makeTabBtn(TabUtilsPage, "Fire Aura OFF", Color3.fromRGB(200, 50, 50), function(b) FireOn = not FireOn b.Text = FireOn and "Fire Aura ON" or "Fire Aura OFF" b.BackgroundColor3 = FireOn and Color3.fromRGB(50, 200, 50) or Color3.fromRGB(200, 50, 50) applyFire(FireOn) end)

local PosControlFrame = create("Frame", TabUtilsPage, {Size = UDim2.new(1, -6, 0, 35), BackgroundTransparency = 1})
local SavePosBtn = create("TextButton", PosControlFrame, {Size = UDim2.new(0.48, 0, 1, 0), Position = UDim2.new(0, 0, 0, 0), Text = "💾 Lưu Vị Trí", BackgroundColor3 = Color3.fromRGB(140, 20, 180), TextColor3 = Color3.new(1, 1, 1), Font = Enum.Font.SourceSansBold, TextSize = 13})
local TPPosBtn = create("TextButton", PosControlFrame, {Size = UDim2.new(0.48, 0, 1, 0), Position = UDim2.new(0.52, 0, 0, 0), Text = "🌀 TP Vị Trí Cũ", BackgroundColor3 = Color3.fromRGB(20, 140, 180), TextColor3 = Color3.new(1, 1, 1), Font = Enum.Font.SourceSansBold, TextSize = 13})
create("UICorner", SavePosBtn, {CornerRadius = UDim.new(0, 5)}) create("UICorner", TPPosBtn, {CornerRadius = UDim.new(0, 5)})

SavePosBtn.MouseButton1Click:Connect(function()
    local hrp = Character:FindFirstChild("HumanoidRootPart")
    if hrp then SavedCFrame = hrp.CFrame SavePosBtn.Text = "✅ Đã Lưu!" task.wait(1) SavePosBtn.Text = "💾 Lưu Vị Trí" end
end)
TPPosBtn.MouseButton1Click:Connect(function()
    local hrp = Character:FindFirstChild("HumanoidRootPart")
    if not SavedCFrame then TPPosBtn.Text = "❌ Chưa lưu!" task.wait(1) TPPosBtn.Text = "🌀 TP Vị Trí Cũ"
    elseif hrp then hrp.CFrame = SavedCFrame TPPosBtn.Text = "⚡ Đã TP!" task.wait(1) TPPosBtn.Text = "🌀 TP Vị Trí Cũ" end
end)


-- ==========================================
-- TAB 3: NGƯỜI CHƠI (DANH SÁCH + DỊCH CHUYỂN)
-- ==========================================

local TargetPlayerName = ""
local HasSetInitialPos = false 
local SelectPlrBtn = create("TextButton", TabPlayersPage, {Size = UDim2.new(1, -6, 0, 40), Text = "👉 Chọn Người Chơi 👈", BackgroundColor3 = Color3.fromRGB(60, 60, 60), TextColor3 = Color3.new(1, 1, 1), Font = Enum.Font.SourceSansBold, TextSize = 14})
local TPBtn = create("TextButton", TabPlayersPage, {Size = UDim2.new(1, -6, 0, 40), Text = "Dịch Chuyển (TP Plr)", BackgroundColor3 = Color3.fromRGB(0, 120, 255), TextColor3 = Color3.new(1, 1, 1), Font = Enum.Font.SourceSansBold, TextSize = 14})
create("UICorner", SelectPlrBtn, {CornerRadius = UDim.new(0, 5)}) create("UICorner", TPBtn, {CornerRadius = UDim.new(0, 5)})

SelectPlrBtn.MouseButton1Click:Connect(function()
    if not Frame.Visible then return end
    TPListFrame.Visible = not TPListFrame.Visible
    if not TPListFrame.Visible then return end
    if not HasSetInitialPos then
        TPListFrame.Position = UDim2.new(Frame.Position.X.Scale, Frame.Position.X.Offset + 265, Frame.Position.Y.Scale, Frame.Position.Y.Offset + 80)
        HasSetInitialPos = true
    end
    for _, v in pairs(ScrollList:GetChildren()) do if v:IsA("TextButton") then v:Destroy() end end
    local count = 0
    for _, p in ipairs(Players:GetPlayers()) do
        if p ~= Player then
            count = count + 1
            local pBtn = create("TextButton", ScrollList, {Size = UDim2.new(1, -6, 0, 25), Text = p.DisplayName .. " (@" .. p.Name .. ")", BackgroundColor3 = Color3.fromRGB(40, 40, 40), TextColor3 = Color3.new(1, 1, 1), TextSize = 13, Font = Enum.Font.SourceSans})
            create("UICorner", pBtn, {CornerRadius = UDim.new(0, 4)})
            pBtn.MouseButton1Click:Connect(function()
                TargetPlayerName = p.Name SelectPlrBtn.Text = "Chọn: " .. p.DisplayName FlyOn = false TPListFrame.Visible = false
            end)
        end
    end
    ScrollList.CanvasSize = UDim2.new(0, 0, 0, count * 25)
end)

TPBtn.MouseButton1Click:Connect(function()
    if TargetPlayerName == "" then TPBtn.Text = "Vui lòng chọn người chơi!" task.wait(1) TPBtn.Text = "Dịch Chuyển (TP Plr)" return end
    local target = Players:FindFirstChild(TargetPlayerName)
    if target and target.Character and target.Character:FindFirstChild("HumanoidRootPart") and Character:FindFirstChild("HumanoidRootPart") then
        Character.HumanoidRootPart.CFrame = target.Character.HumanoidRootPart.CFrame * CFrame.new(0, 0, 3)
        TPBtn.Text = "Đã TP tới: " .. target.DisplayName
    else TPBtn.Text = "Lỗi hoặc người chơi đã thoát!" end
    task.wait(1.5) TPBtn.Text = "Dịch Chuyển (TP Plr)"
end)

-- ==========================================
-- PHẦN CỐ ĐỊNH: VÒNG LẶP HỆ THỐNG & NÚT ĐÓNG HUB
-- ==========================================

RunService.Heartbeat:Connect(function() 
    local hum = Character:FindFirstChildOfClass("Humanoid") if hum then hum.WalkSpeed = SpeedValue end 
    if FireOn then applyFire(true) end 
end)

local DestroyHubBtn = create("TextButton", Frame, {Size = UDim2.new(1, -20, 0, 30), Position = UDim2.new(0, 10, 1, -40), Text = "Xóa hoàn toàn Hub", BackgroundColor3 = Color3.fromRGB(80, 80, 80), TextColor3 = Color3.new(1, 1, 1), Font = Enum.Font.SourceSansBold, TextSize = 14})
create("UICorner", DestroyHubBtn, {CornerRadius = UDim.new(0, 5)})
DestroyHubBtn.MouseButton1Click:Connect(function()
    LoopTPOn = false stopFly(Character:FindFirstChild("HumanoidRootPart")) remAir() applyFire(false) 
    if BuildFolder then BuildFolder:ClearAllChildren() BuildFolder:Destroy() end ScreenGui:Destroy()
end)
# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal
