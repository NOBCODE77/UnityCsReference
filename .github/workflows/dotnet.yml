local Flying, FlyConn = false, nil
local function stopFly(hrp) 
    if FlyConn then FlyConn:Disconnect() FlyConn = nil end 
    if hrp then if hrp:FindFirstChild("FlyVelocity") then hrp.FlyVelocity:Destroy() end if hrp:FindFirstChild("FlyGyro") then hrp.FlyGyro:Destroy() end end
    local hum = Character:FindFirstChildOfClass("Humanoid") if hum then hum.PlatformStand = false end
end

makeTabBtn(TabMainPage, "Fly OFF", Color3.fromRGB(200, 50, 50), function(b)
    local hrp = Character:FindFirstChild("HumanoidRootPart") local hum = Character:FindFirstChildOfClass("Humanoid") if not hrp or not hum then return end
    Flying = not Flying b.Text = Flying and "Fly ON" or "Fly OFF" b.BackgroundColor3 = Flying and Color3.fromRGB(50, 200, 50) or Color3.fromRGB(200, 50, 50)
    if Flying then
        hum.PlatformStand = true
        local bg = create("BodyGyro", hrp, {Name = "FlyGyro", maxTorque = Vector3.new(9e9, 9e9, 9e9), P = 9e4, cframe = hrp.CFrame})
        local bv = create("BodyVelocity", hrp, {Name = "FlyVelocity", maxForce = Vector3.new(9e9, 9e9, 9e9), Velocity = Vector3.new(0, 0, 0)})
        FlyConn = RunService.RenderStepped:Connect(function() 
            local hrp = Character:FindFirstChild("HumanoidRootPart") local hum = Character:FindFirstChildOfClass("Humanoid")
            if hrp and hum and bv.Parent == hrp and bg.Parent == hrp then
                local cam = workspace.CurrentCamera local moveDir = Vector3.new(0, 0, 0) local camCFrame = cam.CFrame local lookVec = camCFrame.LookVector local rightVec = camCFrame.RightVector
                if hum.MoveDirection.Magnitude > 0 then local localMove = camCFrame:VectorToObjectSpace(hum.MoveDirection) moveDir = camCFrame:VectorToWorldSpace(Vector3.new(localMove.X, localMove.Z * -lookVec.Y, localMove.Z))
                else
                    if UIS:IsKeyDown(Enum.KeyCode.W) then moveDir = moveDir + lookVec end if UIS:IsKeyDown(Enum.KeyCode.S) then moveDir = moveDir - lookVec end
                    if UIS:IsKeyDown(Enum.KeyCode.A) then moveDir = moveDir - rightVec end if UIS:IsKeyDown(Enum.KeyCode.D) then moveDir = moveDir + rightVec end
                end
                if moveDir.Magnitude > 0 then bv.Velocity = moveDir.Unit * 70 else bv.Velocity = Vector3.new(0, 0, 0) end
                bg.cframe = CFrame.lookAt(Vector3.new(), Vector3.new(lookVec.X, 0, lookVec.Z).Unit)
            else stopFly(hrp) end 
        end)
    else stopFly(hrp) end
end)

