local function makeTabBtn(parent, txt, color, cb)
    local b = create("TextButton", parent, {Size = UDim2.new(1, -6, 0, 30), Text = txt, BackgroundColor3 = color or Color3.fromRGB(200, 50, 50), TextColor3 = Color3.new(1, 1, 1), Font = Enum.Font.SourceSansBold, TextSize = 14})
    create("UICorner", b, {CornerRadius = UDim.new(0, 5)})
    b.MouseButton1Click:Connect(function() cb(b) end) return b
end

